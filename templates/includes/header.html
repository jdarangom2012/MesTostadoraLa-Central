{% load static %}
<header class="bg-brand-dark text-white px-4 py-3 flex items-center justify-between shadow dark:bg-black/70">
  <div class="flex items-center gap-4">
    <a href="/" class="flex items-center gap-2 font-semibold tracking-wide text-sm lg:text-base">
      <img src="{% static 'img/LogoAgroInduGestor.png' %}" alt="Logo AgroInduGestor" class="h-6 w-6 object-contain"/>
      <span>AgroInduGestor</span>
    </a>
    <nav class="hidden md:flex gap-4 text-xs lg:text-sm">
      <!-- Enlace Dashboard eliminado -->
    </nav>
  </div>
  <div class="flex items-center gap-3 text-xs">
    <button id="darkModeToggle" type="button" class="px-2 py-1 rounded bg-white/10 hover:bg-white/20 text-[11px] tracking-wide">
      <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
    </button>
    <span class="hidden sm:inline text-gray-300">{% now 'Y-m-d H:i' %}</span>
    {% if user.is_authenticated %}
      <span class="text-gray-200">{{ user.username }}{% if user.groups.all.first %} · {{ user.groups.all.first.name }}{% endif %}</span>
      <form method="post" action="{% url 'logout' %}" class="inline">{% csrf_token %}
        <button type="submit" class="bg-red-600/80 hover:bg-red-600 px-2 py-1 rounded text-white">Salir</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="hover:underline">Entrar</a>
      <a href="{% url 'signup' %}" class="hover:underline">Registro</a>
    {% endif %}
  </div>
</header>
<script>
// Persistencia de modo oscuro
(function(){
  const root = document.documentElement;
  const pref = localStorage.getItem('theme');
  if(pref === 'dark' || (!pref && window.matchMedia('(prefers-color-scheme: dark)').matches)){
    root.classList.add('dark');
  }
  document.addEventListener('DOMContentLoaded', ()=>{
    const btn = document.getElementById('darkModeToggle');
    if(!btn) return;
    btn.addEventListener('click', ()=>{
      const isDark = root.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark':'light');
    });
  });
})();
</script>
