{# Fragmento modal eliminación empleado #}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-6" data-modal-root>
  <div class="palette-surface w-full max-w-md rounded-xl shadow-xl border border-brand-dark/30 fade-in p-0 bg-[#1c1c1c] text-white">
    <div class="modal-head flex items-center justify-between px-6 py-4 rounded-t-xl bg-gradient-to-r from-[#1d1d1d] to-[#101010] border-b border-[#333]">
      <h2 class="text-lg font-semibold tracking-tight text-red-400 flex items-center gap-2">🗑️ <span>Eliminar Empleado</span></h2>
      <button type="button" class="close text-sm" data-close-modal>✕</button>
    </div>
    <div class="p-6 space-y-5 text-white">
      <p class="text-sm leading-relaxed text-black">¿Está seguro que desea eliminar el empleado <strong class="text-black font-semibold">{{ empleado.nombres }} {{ empleado.apellidos }}</strong>? Esta acción no se puede deshacer.</p>
      <form method="post" action="{% url 'delete_empleado' empleado.id_empleado %}" class="flex justify-end gap-2" data-modal-form>{% csrf_token %}
        <button type="button" class="btn-base btn-dark" data-close-modal>Cancelar</button>
        <button class="btn-base btn-danger shadow-lg shadow-red-900/40 hover:shadow-red-700/60">Eliminar</button>
      </form>
    </div>
  </div>
</div>
