<div class="fixed inset-0 z-50 flex items-start justify-center bg-black/50 p-6 overflow-y-auto" data-modal-root>
  <div class="palette-surface w-full max-w-lg rounded-xl shadow-xl border border-brand-dark/30 fade-in">
    <div class="modal-head flex items-center justify-between px-6 py-4 rounded-t-xl bg-[#DD3F2E] text-white">
  <h2 class="text-lg font-semibold">Eliminar Selección Tueste #{{ t.id }}</h2>
  <button type="button" class="close text-sm" data-close-modal>✕</button>
    </div>
    <form method="post" action="{% url 'orden_seleccion_tueste_eliminar' t.pk %}" data-modal-form class="p-6 space-y-4">
      {% csrf_token %}
      <p>¿Seguro que deseas eliminar este registro?</p>
      <div class="flex justify-end gap-2 pt-2">
  <button type="button" class="btn-base btn-dark" data-close-modal>Cancelar</button>
        <button type="submit" class="btn-base btn-danger">Eliminar</button>
      </div>
    </form>
  </div>
</div>
