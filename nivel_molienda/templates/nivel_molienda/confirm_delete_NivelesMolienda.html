<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-6" data-modal-root>
  <div class="palette-surface w-full max-w-md rounded-xl shadow-xl border border-brand-dark/30 fade-in">
    <div class="modal-head flex items-center justify-between px-6 py-4 rounded-t-xl">
      <h2 class="text-lg font-semibold">Eliminar Nivel</h2>
      <button type="button" class="close text-sm" data-close-modal>✕</button>
    </div>
    <form method="post" action="{% url 'nivel_molienda_eliminar' obj.pk %}" class="p-6 space-y-6" data-modal-form>{% csrf_token %}
      <p>¿Seguro que deseas eliminar "{{ obj.nivel_molienda }}"?</p>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" class="btn-base btn-dark" data-close-modal>Cancelar</button>
        <button class="btn-base btn-danger">Eliminar</button>
      </div>
    </form>
  </div>
</div>
