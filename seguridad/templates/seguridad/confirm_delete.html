{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl">
  <h1 class="text-xl font-bold mb-4">{{ titulo }}</h1>

  <div class="bg-white/80 dark:bg-gray-800/60 border border-gray-200 dark:border-gray-700 rounded-lg p-4">
    <p class="text-sm mb-4">¿Confirmas eliminar: <span class="font-semibold">{{ obj }}</span>?</p>

    <form method="post" class="flex justify-end gap-2">
      {% csrf_token %}
      <a href="javascript:history.back()" class="px-4 py-2 rounded border border-gray-300 dark:border-gray-600">Cancelar</a>
      <button type="submit" class="px-4 py-2 rounded bg-red-700 text-white hover:opacity-90">Eliminar</button>
    </form>
  </div>
</div>
{% endblock %}
