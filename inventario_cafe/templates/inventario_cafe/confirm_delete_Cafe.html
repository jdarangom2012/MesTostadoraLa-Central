<div class="fixed inset-0 z-50 flex items-start justify-center bg-black/45 p-6 overflow-y-auto" data-modal-root>
  <div class="palette-surface w-full max-w-md rounded-xl shadow-xl border border-brand-dark/30 fade-in">
    <div class="modal-head flex items-center justify-between px-6 py-4 rounded-t-xl">
      <h3 class="text-base font-semibold">Eliminar Registro de Café #{{ obj.id }}</h3>
      <button type="button" class="close transition text-sm" data-close-modal aria-label="Cerrar">✕</button>
    </div>
    <form method="post" action="{% url 'inventario_cafe_eliminar' obj.id %}" class="p-6 space-y-4" data-modal-form>
      {% csrf_token %}
      <input type="hidden" name="q" value="{{ search }}" />
      <input type="hidden" name="origen" value="{{ f_origen }}" />
      <input type="hidden" name="proceso" value="{{ f_proceso }}" />
      <input type="hidden" name="variedad" value="{{ f_variedad }}" />
      <input type="hidden" name="page" value="{{ page_num }}" />
      <p class="text-sm">Esta acción no se puede deshacer. ¿Deseas continuar?</p>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" class="btn-base" data-close-modal>Cancelar</button>
        <button type="submit" class="btn-base btn-danger">Eliminar</button>
      </div>
    </form>
  </div>
</div>
