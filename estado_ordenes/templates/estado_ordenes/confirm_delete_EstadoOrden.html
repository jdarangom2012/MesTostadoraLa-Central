<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-6" data-modal-root>
  <div class="palette-surface w-full max-w-md rounded-xl shadow-xl border border-brand-dark/30 fade-in p-0">
    <div class="modal-head flex items-center justify-between px-6 py-4 rounded-t-xl border-b border-gray-200 bg-white">
      <h2 class="text-lg font-semibold tracking-tight text-red-600 flex items-center gap-2">🗑️ <span>Eliminar Estado</span></h2>
      <button type="button" class="close text-sm" data-close-modal>✕</button>
    </div>
    <div class="p-6 space-y-5 text-gray-900">
      <p class="text-sm leading-relaxed text-gray-800">¿Confirmas eliminar <strong class="text-gray-900 font-semibold">{{ obj }}</strong>? Esta acción no se puede deshacer.</p>
      <form method="post" action="{% url 'estado_orden_eliminar' obj.pk %}" class="flex justify-end gap-2" data-modal-form>{% csrf_token %}
        <button type="button" class="btn-base btn-dark" data-close-modal>Cancelar</button>
        <button class="btn-base btn-danger shadow-lg shadow-red-900/20 hover:shadow-red-700/40">Eliminar</button>
      </form>
    </div>
  </div>
</div>
