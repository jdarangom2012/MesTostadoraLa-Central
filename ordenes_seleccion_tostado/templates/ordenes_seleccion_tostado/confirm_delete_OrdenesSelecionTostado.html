<div class="fixed inset-0 z-50 flex items-start justify-center bg-black/50 p-6 overflow-y-auto" data-modal-root>
  <div class="palette-surface w-full max-w-md rounded-xl shadow-xl border border-brand-dark/30 fade-in">
    <div class="modal-head flex items-center justify-between px-6 py-4 rounded-t-xl">
      <h2 class="text-lg font-semibold flex items-center gap-2">🗑️ Eliminar Selección Tostado #{{ t.id }}</h2>
      <button type="button" class="close text-sm" data-close-modal>✕</button>
    </div>
    <form method="post" action="{% url 'orden_seleccion_tostado_eliminar' t.pk %}" class="p-6 space-y-4" data-modal-form>
      {% csrf_token %}
      <input type="hidden" name="fragment" value="1" />
      <p class="text-sm">Esta acción no se puede deshacer. ¿Deseas continuar?</p>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" class="btn-base btn-dark" data-close-modal>Cancelar</button>
        <button type="submit" class="btn-base btn-danger">Eliminar</button>
      </div>
    </form>
  </div>
</div>
